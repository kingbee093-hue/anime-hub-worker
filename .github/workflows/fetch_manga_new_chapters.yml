name: AnimeHub - Manga New Chapters

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-manga-new-chapters, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-manga-new-chapters
  cancel-in-progress: false

jobs:
  fetch_manga_new_chapters:
    name: Refresh Manga New Chapters
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Refresh Manga Catalog (Direct AniList Pull)
        env:
          MANGA_SKIP_CHAPTER_INDEX: '1'
          MANGA_FORCE_FULL_REFRESH: '0'
        run: npm run fetch:manga

      - name: Build New Chapters Feed (48h Window)
        env:
          MANGA_NEW_CHAPTERS_FRESH_HOURS: '48'
          MANGA_NEW_CHAPTERS_MAX_ATTEMPTS: '4'
          MANGA_NEW_CHAPTERS_RETRY_DELAY_MS: '3000'
          MANGA_NEW_CHAPTERS_LIMIT: '0'
        run: npm run fetch:manga-new-chapters

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga api/search/manga_index
          if git diff --staged --quiet; then
            echo "No manga new chapters changes to commit."
          else
            git commit -m "api: independent manga new chapters refresh [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
