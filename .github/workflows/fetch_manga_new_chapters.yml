name: Refresh Manga New Chapters

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-manga-new-chapters, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-manga-new-chapters
  cancel-in-progress: true

jobs:
  refresh_manga_new_chapters:
    name: Build New Chapters Feed (48h Window)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build New Chapters Feed (48h Window)
        shell: bash
        run: |
          npm run fetch:manga-new-chapters

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga/new_chapters.json api/manga/discovery_state.json api/manga/discovery_report.json api/manga/request_health.json
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: independent manga new chapters refresh [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
