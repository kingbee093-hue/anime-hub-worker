name: AnimeHub - Manga Catalog

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Force a full MangaDex chapter refresh
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [run-manga, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-manga
  cancel-in-progress: true

jobs:
  fetch_manga:
    name: Build Manga Catalog, Search Index, and MangaDex Mapping
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Manga Builder
        shell: bash
        env:
          MANGA_RELEASING_REFRESH_HOURS: '12'
          MANGA_LIBRARY_REFRESH_HOURS: '168'
          MANGA_MAX_RELEASING_TITLES: '80'
          MANGA_MAX_LIBRARY_TITLES: '40'
          FORCE_REFRESH_INPUT: ${{ github.event.inputs.full_refresh || 'false' }}
        run: |
          if [ "$FORCE_REFRESH_INPUT" = "true" ]; then
            export MANGA_FORCE_FULL_REFRESH=1
            echo "Running full manga refresh."
          else
            echo "Running incremental manga refresh."
          fi
          npm run fetch:manga

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga api/search
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: rebuild manga catalog [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
