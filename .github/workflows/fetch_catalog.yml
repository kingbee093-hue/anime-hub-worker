name: Fetch Anime Catalog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-catalog, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-catalog
  cancel-in-progress: false

jobs:
  fetch_catalog:
    name: Build Anime Catalog, Search Index, and Studios
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Catalog Builder
        run: npm run fetch:catalog

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/catalog api/search
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: rebuild anime catalog [skip ci]" && git push)
