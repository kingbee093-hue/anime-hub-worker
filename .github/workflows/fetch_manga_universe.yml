name: AnimeHub - Manga Universe

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-manga-universe, run-all]
  workflow_run:
    workflows: ['AnimeHub - Manga Catalog']
    types: [completed]

permissions:
  contents: write

concurrency:
  group: fetch-manga-universe
  cancel-in-progress: true

jobs:
  build_universe:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Build Manga Universe Backfill Set
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Manga Universe
        env:
          MANGA_UNIVERSE_MIN_YEAR: '2020'
          MANGA_UNIVERSE_LEGACY_POPULARITY: '100000'
          MANGA_UNIVERSE_PAGE_SIZE: '120'
        run: npm run fetch:manga-universe

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga/universe
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: rebuild manga universe [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
