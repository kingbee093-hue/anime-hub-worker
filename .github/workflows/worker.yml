name: Anime Hub Worker Cron

on:
  workflow_dispatch:
    inputs:
      job_target:
        description: 'Specific job to run (recent, news, sections, genres, cleanup, or all)'
        required: true
        default: 'all'

  repository_dispatch:
    types: [run-recent, run-news, run-sections, run-genres, run-cleanup, run-all]

jobs:

  recent_episodes:
    name: Fetch Recent Episodes
    runs-on: ubuntu-latest
    if: github.event.inputs.job_target == 'recent' || github.event.inputs.job_target == 'all' || github.event.action == 'run-recent' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Recent Episodes Fetcher
        run: npm run fetch:recent

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update recent episodes [skip ci]" && git push)

  fetch_news:
    name: Fetch Latest News
    runs-on: ubuntu-latest
    if: github.event.inputs.job_target == 'news' || github.event.inputs.job_target == 'all' || github.event.action == 'run-news' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run News Fetcher
        run: npm run fetch:news

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update news [skip ci]" && git push)

  fetch_sections:
    name: Fetch General Sections (Top Rated, Popular, etc)
    runs-on: ubuntu-latest
    if: github.event.inputs.job_target == 'sections' || github.event.inputs.job_target == 'all' || github.event.action == 'run-sections' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sections Fetcher
        run: npm run fetch:sections

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update frontpage sections [skip ci]" && git push)

  fetch_genres:
    name: Fetch By Genre
    runs-on: ubuntu-latest
    if: github.event.inputs.job_target == 'genres' || github.event.inputs.job_target == 'all' || github.event.action == 'run-genres' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Genres Fetcher
        run: npm run fetch:genres

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update genres [skip ci]" && git push)
