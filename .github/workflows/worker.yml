name: Anime Hub Worker Cron

on:
  schedule:
    # 1) Recent Episodes every 30 minutes
    - cron: '*/30 * * * *'
    
    # 2) News every hour
    - cron: '15 * * * *'
    
    # 3) Main Sections every 6 hours
    - cron: '0 */6 * * *'
    
    # 4) Genres once a day at 2:00 AM
    - cron: '0 2 * * *'
    
    # 5) Daily cleanup at 00:00 UTC
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      job_target:
        description: 'Specific job to run (recent, news, sections, genres, cleanup, or all)'
        required: true
        default: 'all'

  repository_dispatch:
    types: [run-recent, run-news, run-sections, run-genres, run-cleanup, run-all]

jobs:
  cleanup:
    name: Daily Cleanup
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.job_target == 'cleanup' || github.event.inputs.job_target == 'all' || github.event.action == 'run-cleanup' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Cleanup
        run: node cleanup_seen.js

      - name: Commit Updated seen_episodes.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_episodes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: cleanup old seen episodes" && git push)

  recent_episodes:
    name: Fetch Recent Episodes
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event.inputs.job_target == 'recent' || github.event.inputs.job_target == 'all' || github.event.action == 'run-recent' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Recent Episodes Fetcher
        run: npm run fetch:recent
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Commit Updated seen_episodes.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_episodes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update seen episodes tracking" && git push)

  fetch_news:
    name: Fetch Latest News
    runs-on: ubuntu-latest
    if: github.event.schedule == '15 * * * *' || github.event.inputs.job_target == 'news' || github.event.inputs.job_target == 'all' || github.event.action == 'run-news' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run News Fetcher
        run: npm run fetch:news
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

  fetch_sections:
    name: Fetch General Sections (Top Rated, Popular, etc)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */6 * * *' || github.event.inputs.job_target == 'sections' || github.event.inputs.job_target == 'all' || github.event.action == 'run-sections' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sections Fetcher
        run: npm run fetch:sections
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

  fetch_genres:
    name: Fetch By Genre
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.job_target == 'genres' || github.event.inputs.job_target == 'all' || github.event.action == 'run-genres' || github.event.action == 'run-all'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Genres Fetcher
        run: npm run fetch:genres
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
