name: AnimeHub - Manga Page Backfill

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Chapter page manifest warmup batch size
        required: false
        default: '40'
        type: string
      per_title:
        description: Max chapters per title in one run
        required: false
        default: '8'
        type: string
      target_ids:
        description: Optional comma-separated AniList/MangaDex IDs to warm
        required: false
        default: ''
        type: string
  repository_dispatch:
    types: [run-manga-pages-backfill, run-all]
  workflow_run:
    workflows: ['AnimeHub - Manga Chapter Backfill']
    types: [completed]

permissions:
  contents: write

concurrency:
  group: backfill-manga-pages
  cancel-in-progress: false

jobs:
  backfill_pages:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Warm Manga Reader Page Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Page Backfill
        shell: bash
        env:
          BATCH_SIZE_INPUT: ${{ github.event.inputs.batch_size || '40' }}
          PER_TITLE_INPUT: ${{ github.event.inputs.per_title || '8' }}
          TARGET_IDS_INPUT: ${{ github.event.inputs.target_ids || '' }}
        run: |
          export MANGA_PAGE_BACKFILL_BATCH="${BATCH_SIZE_INPUT}"
          export MANGA_PAGE_BACKFILL_PER_TITLE="${PER_TITLE_INPUT}"
          export MANGA_PAGE_LANGUAGES="en"
          export MANGA_PAGE_TARGET_IDS="${TARGET_IDS_INPUT}"
          npm run backfill:manga-pages

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga/pages api/manga/backfill
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: warm manga page manifests [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
