name: AnimeHub - Main Sections

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-sections, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-sections
  cancel-in-progress: false

jobs:
  fetch_sections:
    name: Fetch General Sections (Top Rated, Popular, etc)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sections Fetcher
        run: npm run fetch:sections

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update frontpage sections [skip ci]" && git push)
