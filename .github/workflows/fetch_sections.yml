name: AnimeHub - Main Sections

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-sections, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-sections
  cancel-in-progress: false

jobs:
  fetch_sections:
    name: Fetch General Sections + By Genre
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sections Fetcher (includes By Genre)
        run: npm run fetch:sections

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: update frontpage sections + genres [skip ci]"
            # Pull latest changes. In case of conflict, -X theirs keeps OUR changes during rebase.
            git pull --rebase -X theirs origin main
            git push origin HEAD:main
          fi
