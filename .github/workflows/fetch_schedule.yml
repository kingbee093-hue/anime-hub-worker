name: AnimeHub - Schedule

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-schedule, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-schedule
  cancel-in-progress: false

jobs:
  fetch_schedule:
    name: Fetch Weekly Schedule
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Schedule Fetcher
        run: npm run fetch:schedule

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/schedule
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: update schedule [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
