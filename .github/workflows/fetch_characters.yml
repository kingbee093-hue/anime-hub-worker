name: AnimeHub - Character Catalog

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-characters, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-characters
  cancel-in-progress: false

jobs:
  fetch_characters:
    name: Build Character Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Character Catalog Builder
        run: npm run fetch:characters

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/catalog/characters.json
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: rebuild character catalog [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
