name: AnimeHub - Recent Episodes

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-recent, run-all]

permissions:
  contents: write

concurrency:
  group: fetch-recent
  cancel-in-progress: false

jobs:
  recent_episodes:
    name: Fetch Recent Episodes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Recent Episodes Fetcher
        run: npm run fetch:recent

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: update recent episodes [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
