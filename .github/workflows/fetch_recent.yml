name: Fetch Recent Episodes

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-recent, run-all]

jobs:
  recent_episodes:
    name: Fetch Recent Episodes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Recent Episodes Fetcher
        run: npm run fetch:recent

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "api: update recent episodes [skip ci]" && git push)
