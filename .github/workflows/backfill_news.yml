name: Backfill News (Run Once)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backfill-news
  cancel-in-progress: false

jobs:
  backfill_news:
    name: Backfill Historical News (2019 - Now)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backfill Script
        run: npm run backfill:news

      - name: Commit Backfilled News
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/news*.json
          if git diff --staged --quiet; then
            echo "No API changes to commit."
          else
            git commit -m "api: backfill historical news 2019-now [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
