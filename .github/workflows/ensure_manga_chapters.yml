name: AnimeHub - Manga Chapters

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: Force processing all catalog titles that still need chapter work
        required: false
        default: false
        type: boolean
      batch_size:
        description: Number of manga titles to process in one run
        required: false
        default: '12'
        type: string
      section_scope:
        description: Section scope to process first (e.g. trending, featured, top_rated, popular, releasing, new_chapters, genre:Action)
        required: false
        default: 'trending'
        type: string
      target_ids:
        description: Optional comma-separated AniList or MangaDex IDs to process
        required: false
        default: ''
        type: string
  repository_dispatch:
    types: [run-manga-chapters, run-all]
  workflow_run:
    workflows: ['AnimeHub - Manga Catalog']
    types: [completed]

permissions:
  contents: write

concurrency:
  group: ensure-manga-chapters
  cancel-in-progress: false

jobs:
  ensure_manga_chapters:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Ensure Manga Chapter Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Chapter Coverage
        shell: bash
        env:
          MANGA_ENABLE_ENGLISH_FALLBACK: '1'
          FORCE_ALL_INPUT: ${{ github.event.inputs.force_all || 'false' }}
          BATCH_SIZE_INPUT: ${{ github.event.inputs.batch_size || '12' }}
          SECTION_SCOPE_INPUT: ${{ github.event.inputs.section_scope || 'trending' }}
          TARGET_IDS_INPUT: ${{ github.event.inputs.target_ids || '' }}
        run: |
          export MANGA_BACKFILL_CHAPTER_BATCH="${BATCH_SIZE_INPUT}"
          export MANGA_BACKFILL_SECTION="${SECTION_SCOPE_INPUT}"
          if [ "$FORCE_ALL_INPUT" = "true" ]; then
            export MANGA_BACKFILL_FORCE_ALL=1
          fi
          if [ -n "$TARGET_IDS_INPUT" ]; then
            export MANGA_BACKFILL_TARGET_IDS="$TARGET_IDS_INPUT"
          fi
          echo "Running smart manga chapter coverage."
          npm run backfill:manga-chapters

      - name: Commit API updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/manga/chapters api/manga/backfill api/manga/new_chapters.json api/manga/mangadex_mapping_fallback.json
          if git diff --staged --quiet; then
            echo "No chapter coverage changes to commit."
          else
            git commit -m "api: ensure manga chapter coverage [skip ci]"
            git pull --rebase origin main || git pull origin main
            git push origin HEAD:main
          fi
